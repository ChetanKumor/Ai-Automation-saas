<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Appointments — WhatsApp CRM Admin</title>
  <link rel="stylesheet" href="/admin/style.css">
</head>
<body>
  <nav>
    <a href="/admin/tenants.html" class="brand">WhatsApp CRM</a>
    <a href="/admin/leads.html">Leads</a>
    <a href="/admin/collections.html">Collections</a>
    <a href="/admin/appointments.html">Appointments</a>
    <a href="/admin/notifications.html">Notifications</a>
    <a href="/admin/logout">Logout</a>
  </nav>

  <div class="container">
    <div class="flex-between mb-20" style="margin-top:20px;">
      <h2>Appointments</h2>
      <div style="display:flex;gap:8px;align-items:center;">
        <select id="tenantFilter" style="padding:6px 10px;border:1px solid #ddd;border-radius:6px;font-size:13px;">
          <option value="">All tenants</option>
        </select>
        <select id="statusFilter" style="padding:6px 10px;border:1px solid #ddd;border-radius:6px;font-size:13px;">
          <option value="">All reminder statuses</option>
          <option value="pending">Pending</option>
          <option value="sending">Sending</option>
          <option value="sent">Sent</option>
          <option value="failed">Failed</option>
          <option value="needs_template">Needs Template</option>
          <option value="needs_review">Needs Review</option>
        </select>
      </div>
    </div>

    <div class="card" style="padding:0; overflow-x:auto;">
      <table>
        <thead>
          <tr>
            <th>Customer</th>
            <th>Doctor</th>
            <th>Appointment</th>
            <th>Reminder Status</th>
            <th class="hide-mobile">Attempts</th>
            <th class="hide-mobile">Business</th>
          </tr>
        </thead>
        <tbody id="appointmentsList">
          <tr><td colspan="6" class="text-muted" style="text-align:center; padding:24px;">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    const STATUS_BADGE = {
      pending:        'badge-blue',
      sending:        'badge-yellow',
      sent:           'badge-green',
      failed:         'badge-red',
      needs_template: 'badge-yellow',
      needs_review:   'badge-red',
    };

    async function loadTenants() {
      const res = await fetch('/admin/api/tenants');
      if (res.status === 401) return window.location.href = '/admin';
      const tenants = await res.json();
      const sel = document.getElementById('tenantFilter');
      tenants.forEach(t => {
        const opt = document.createElement('option');
        opt.value = t.id;
        opt.textContent = t.business_name;
        sel.appendChild(opt);
      });
    }

    async function loadAppointments() {
      const tenant = document.getElementById('tenantFilter').value;
      const status = document.getElementById('statusFilter').value;
      const params = new URLSearchParams();
      if (tenant) params.set('tenant_id', tenant);
      if (status) params.set('reminder_status', status);

      const res = await fetch('/admin/api/appointments?' + params);
      if (res.status === 401) return window.location.href = '/admin';
      const rows = await res.json();
      const tbody = document.getElementById('appointmentsList');

      if (!rows.length) {
        tbody.innerHTML = '<tr><td colspan="6" class="text-muted" style="text-align:center; padding:24px;">No appointments found.</td></tr>';
        return;
      }

      tbody.innerHTML = rows.map(r => `
        <tr>
          <td><strong>${esc(r.customer_name || '—')}</strong><br><code style="font-size:12px;">${esc(r.customer_phone)}</code></td>
          <td>${esc(r.doctor_name)}</td>
          <td>${new Date(r.appointment_time).toLocaleString('en-IN', {timeZone:'Asia/Kolkata'})}</td>
          <td><span class="badge ${STATUS_BADGE[r.reminder_status] || ''}">${esc(r.reminder_status)}</span></td>
          <td class="hide-mobile">${r.reminder_attempts}</td>
          <td class="hide-mobile">${esc(r.business_name)}</td>
        </tr>
      `).join('');
    }

    function esc(s) {
      if (!s) return '';
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    document.getElementById('tenantFilter').addEventListener('change', loadAppointments);
    document.getElementById('statusFilter').addEventListener('change', loadAppointments);

    loadTenants();
    loadAppointments();
  </script>
</body>
</html>
