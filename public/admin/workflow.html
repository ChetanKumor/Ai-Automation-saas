<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workflow — WhatsApp CRM Admin</title>
  <link rel="stylesheet" href="/admin/style.css">
</head>
<body>
  <nav>
    <a href="/admin/tenants.html" class="brand">WhatsApp CRM</a>
    <a href="/admin/conversations.html">Conversations</a>
    <a href="/admin/leads.html">Leads</a>
    <a href="/admin/collections.html">Collections</a>
    <a href="/admin/appointments.html">Appointments</a>
    <a href="/admin/workflow.html">Workflow</a>
    <a href="/admin/notifications.html">Notifications</a>
    <a href="/admin/logout">Logout</a>
  </nav>

  <div class="container">
    <div class="flex-between mb-20" style="margin-top:20px;">
      <h2>Workflow Executions</h2>
      <div style="display:flex;gap:8px;align-items:center;">
        <select id="tenantFilter" style="padding:6px 10px;border:1px solid #ddd;border-radius:6px;font-size:13px;">
          <option value="">All tenants</option>
        </select>
        <select id="statusFilter" style="padding:6px 10px;border:1px solid #ddd;border-radius:6px;font-size:13px;">
          <option value="">All statuses</option>
          <option value="running">Running</option>
          <option value="success">Success</option>
          <option value="failed">Failed</option>
          <option value="skipped">Skipped</option>
        </select>
      </div>
    </div>

    <div class="card" style="padding:0; overflow-x:auto;">
      <table>
        <thead>
          <tr>
            <th>Rule</th>
            <th>Action</th>
            <th>Event</th>
            <th>Status</th>
            <th>Error</th>
            <th class="hide-mobile">Business</th>
            <th>Time</th>
          </tr>
        </thead>
        <tbody id="execList">
          <tr><td colspan="7" class="text-muted" style="text-align:center; padding:24px;">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script src="/admin/app.js"></script>
  <script>
    const STATUS_BADGE = {
      running: 'badge-yellow',
      success: 'badge-green',
      failed:  'badge-red',
      skipped: 'badge-blue',
    };

    async function loadTenants() {
      const res = await adminFetch('/admin/api/tenants');
      if (res.status === 401) return window.location.href = '/admin';
      const tenants = await res.json();
      const sel = document.getElementById('tenantFilter');
      tenants.forEach(t => {
        const opt = document.createElement('option');
        opt.value = t.id;
        opt.textContent = t.business_name;
        sel.appendChild(opt);
      });
    }

    async function loadExecutions() {
      const tenant = document.getElementById('tenantFilter').value;
      const status = document.getElementById('statusFilter').value;
      const params = new URLSearchParams();
      if (tenant) params.set('tenant_id', tenant);
      if (status) params.set('status', status);

      const res = await adminFetch('/admin/api/workflow-executions?' + params);
      if (res.status === 401) return window.location.href = '/admin';
      const rows = await res.json();
      const tbody = document.getElementById('execList');

      if (!rows.length) {
        tbody.innerHTML = '<tr><td colspan="7" class="text-muted" style="text-align:center; padding:24px;">No workflow executions found.</td></tr>';
        return;
      }

      tbody.innerHTML = rows.map(r => `
        <tr>
          <td><strong>${esc(r.rule_name)}</strong></td>
          <td><code style="font-size:12px;">${esc(r.action)}</code></td>
          <td>${esc(r.event_type)}</td>
          <td><span class="badge ${STATUS_BADGE[r.status] || ''}">${esc(r.status)}</span></td>
          <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${esc(r.error || '')}">${esc(r.error || '—')}</td>
          <td class="hide-mobile">${esc(r.business_name)}</td>
          <td>${new Date(r.created_at).toLocaleString('en-IN', {timeZone:'Asia/Kolkata'})}</td>
        </tr>
      `).join('');
    }

    function esc(s) {
      if (!s) return '';
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    document.getElementById('tenantFilter').addEventListener('change', loadExecutions);
    document.getElementById('statusFilter').addEventListener('change', loadExecutions);

    loadTenants();
    loadExecutions();
  </script>
</body>
</html>
