<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Smile Dental — unified patient thread</title>
  <meta name="description" content="One patient, one thread — a Telugu voice call and a WhatsApp chat, handled by the AI receptionist. Appointment booked.">
  <link rel="stylesheet" href="./fonts/fonts.css">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="wrap">

    <!-- Clinic brand strip -->
    <div class="topbar">
      <span class="brand__mark" aria-hidden="true">
        <svg viewBox="0 0 24 24"><path fill="currentColor" d="M10 3h4a1 1 0 0 1 1 1v5h5a1 1 0 0 1 1 1v4a1 1 0 0 1-1 1h-5v5a1 1 0 0 1-1 1h-4a1 1 0 0 1-1-1v-5H4a1 1 0 0 1-1-1v-4a1 1 0 0 1 1-1h5V4a1 1 0 0 1 1-1Z"/></svg>
      </span>
      <span class="brand__name">Smile Dental</span>
      <span class="brand__dot" aria-hidden="true">·</span>
      <span class="brand__sub">AI receptionist</span>
    </div>

    <!-- Patient identity across both channels (injected) -->
    <header class="patient" id="patient"></header>

    <!-- Dominant outcome card — the payoff (injected) -->
    <section class="outcome" id="outcome" aria-label="Appointment outcome"></section>

    <!-- Two-pane unified thread -->
    <main class="threads">
      <section class="pane pane--call" aria-label="Voice call transcript">
        <div class="pane__head">
          <span class="pane__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.9.36 1.78.7 2.62a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.46-1.27a2 2 0 0 1 2.11-.45c.84.34 1.72.57 2.62.7A2 2 0 0 1 22 16.92z"/></svg>
          </span>
          <div class="pane__id">
            <div class="pane__title">Voice call</div>
            <div class="pane__sub">Answered by the AI receptionist</div>
          </div>
          <span class="pane__lang pane__lang--call">Telugu · te-IN</span>
        </div>
        <div class="pane__body" id="callBody"></div>
      </section>

      <section class="pane pane--wa" aria-label="WhatsApp conversation">
        <div class="pane__head">
          <span class="pane__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path fill="#25D366" d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.149-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.372-.025-.521-.075-.148-.669-1.611-.916-2.207-.242-.579-.487-.5-.669-.51l-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.263.489 1.694.625.712.227 1.36.195 1.872.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347M12.05 21.785h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.999-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.002-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
          </span>
          <div class="pane__id">
            <div class="pane__title">WhatsApp</div>
            <div class="pane__sub">Same patient · same thread</div>
          </div>
          <span class="pane__lang pane__lang--wa">English</span>
        </div>
        <div class="pane__body" id="waBody"></div>
      </section>
    </main>

    <!-- Provenance footnote (injected) -->
    <footer class="foot" id="foot"></footer>
  </div>

  <script src="./app.js"></script>
</body>
</html>
