<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zyon — OG Image (1200×630)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink-900:#0B0C0E;--surface-1:#121317;--border:rgba(255,255,255,0.08);--border-strong:rgba(255,255,255,0.14);
    --text-primary:#F5F6F7;--text-secondary:#A2A6AD;--text-tertiary:#6C6F77;
    --accent:#5C8DF0;--accent-glow:rgba(92,141,240,0.35);
    --wa-out:#005C4B;--wa-text:#E9EDEF;--wa-tick:#53BDEB;--wa-online:#25D366;
    --font-sans:'Geist','Inter',-apple-system,sans-serif;--font-mono:'Geist Mono','JetBrains Mono',ui-monospace,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#000;display:flex;align-items:center;justify-content:center;padding:24px;font-family:var(--font-sans)}
  .og{width:1200px;height:630px;background:var(--ink-900);position:relative;overflow:hidden;
    display:flex;flex-direction:column;justify-content:space-between;padding:64px 70px}
  .og::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;
    background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:.6}

  .og-top{display:flex;align-items:center;gap:14px}
  .og-mark{width:36px;height:36px}
  .og-mark rect{fill:none;stroke:var(--text-primary);stroke-width:2}
  .og-mark circle{fill:var(--text-primary)}
  .og-brand{font-size:1.75rem;font-weight:600;letter-spacing:-0.02em;color:var(--text-primary)}

  .og-mid{display:flex;align-items:flex-end;justify-content:space-between;gap:48px}
  .og-headline{font-size:64px;font-weight:600;letter-spacing:-0.035em;line-height:1.04;color:var(--text-primary);max-width:680px}
  .og-headline .dim{color:var(--text-tertiary)}

  /* chat bubble accent */
  .og-chat{flex-shrink:0;display:flex;flex-direction:column;gap:10px;align-items:flex-end;margin-bottom:6px}
  .og-bubble{background:var(--wa-out);color:var(--wa-text);padding:14px 18px 11px;border-radius:14px;
    border-top-right-radius:4px;font-size:20px;line-height:1.35;max-width:320px;box-shadow:0 20px 50px rgba(0,0,0,.5)}
  .og-bubble .t{display:block;text-align:right;font-size:13px;color:#8FA9A0;margin-top:5px}
  .og-bubble .t::after{content:" ✓✓";color:var(--wa-tick)}
  .og-presence{display:inline-flex;align-items:center;gap:8px;font-family:var(--font-mono);font-size:15px;color:var(--wa-online)}
  .og-presence::before{content:"";width:8px;height:8px;border-radius:999px;background:var(--wa-online)}

  .og-bottom{display:flex;align-items:center;justify-content:space-between}
  .og-tag{font-family:var(--font-mono);font-size:17px;letter-spacing:0.06em;text-transform:uppercase;color:var(--text-tertiary);
    display:inline-flex;align-items:center;gap:11px}
  .og-tag .dot{width:7px;height:7px;border-radius:999px;background:var(--accent);box-shadow:0 0 0 5px var(--accent-glow)}
  .og-url{font-family:var(--font-mono);font-size:17px;color:var(--text-secondary)}

  .hint{position:fixed;top:6px;left:50%;transform:translateX(-50%);font-family:monospace;font-size:11px;color:#555}
</style>
</head>
<body>
  <div class="hint">Export this 1200×630 frame to /public/og-image.png</div>
  <div class="og">
    <div class="og-top">
      <svg class="og-mark" viewBox="0 0 22 22" aria-hidden="true"><rect x="2" y="2" width="18" height="18" rx="5"/><circle cx="7.5" cy="11" r="1.5"/><circle cx="11" cy="11" r="1.5"/><circle cx="14.5" cy="11" r="1.5"/></svg>
      <span class="og-brand">Zyon</span>
    </div>

    <div class="og-mid">
      <h1 class="og-headline">AI infrastructure for businesses that run on <span class="dim">WhatsApp</span></h1>
      <div class="og-chat">
        <span class="og-presence">online</span>
        <div class="og-bubble">Booked. Thursday, 11:00 AM with Dr. Rao.<span class="t">9:15 AM</span></div>
      </div>
    </div>

    <div class="og-bottom">
      <span class="og-tag"><span class="dot"></span>AI receptionist · Workflows · CRM · Appointments</span>
      <span class="og-url">yourdomain.com</span>
    </div>
  </div>
</body>
</html>
