<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Self-contained ink tile so the icon reads on both light and dark browser tabs -->
  <rect x="3" y="3" width="94" height="94" rx="24" fill="#0B0C0E" stroke="rgba(255,255,255,0.14)" stroke-width="2"/>
  <!-- Three "chat" dots — the Zyon mark -->
  <circle cx="30" cy="50" r="8" fill="#F5F6F7"/>
  <circle cx="50" cy="50" r="8" fill="#F5F6F7"/>
  <circle cx="70" cy="50" r="8" fill="#F5F6F7"/>
</svg>
